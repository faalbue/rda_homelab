---
- name: Update Proxmox
  hosts: proxmox
  gather_facts: true
  become: true

  tasks:
    - name: Disable PVE enterprise repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-enterprise.list
        content: "# deb https://enterprise.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-enterprise\n"
        owner: root
        group: root
        mode: "0644"

    - name: Disable Ceph enterprise repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/ceph.list
        content: "# deb https://enterprise.proxmox.com/debian/ceph-squid {{ ansible_distribution_release }} enterprise\n"
        owner: root
        group: root
        mode: "0644"

    - name: Enable no-subscription repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-subscription.list
        content: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription\n"
        owner: root
        group: root
        mode: "0644"

    - name: Run apt update and dist-upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if kernel updated
      ansible.builtin.reboot:
        reboot_timeout: 120
      when: reboot_required.stat.exists
